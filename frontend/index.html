<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C 盘清理 - 预览与清理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Microsoft YaHei"', '"微软雅黑"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['ui-monospace', 'monospace'],
          },
          colors: {
            border: 'hsl(215 20% 25%)',
            input: 'hsl(215 20% 25%)',
            ring: '#7C2AE8',
            background: 'hsl(222 47% 8%)',
            foreground: 'hsl(210 40% 98%)',
            primary: {
              DEFAULT: '#7C2AE8',
              foreground: '#ffffff',
            },
            secondary: {
              DEFAULT: 'hsl(215 25% 18%)',
              foreground: 'hsl(210 40% 98%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 72% 45%)',
              foreground: 'hsl(0 0% 100%)',
            },
            muted: {
              DEFAULT: 'hsl(215 25% 18%)',
              foreground: 'hsl(215 20% 55%)',
            },
            accent: {
              DEFAULT: '#A3E635',
              foreground: '#0a0a0a',
            },
            card: {
              DEFAULT: 'hsl(222 35% 12%)',
              foreground: 'hsl(210 40% 98%)',
            },
          },
          borderRadius: {
            lg: '0.75rem',
            md: '0.5rem',
            sm: '0.375rem',
          },
          boxShadow: {
            'card': '0 1px 3px 0 rgb(0 0 0 / 0.2), 0 1px 2px -1px rgb(0 0 0 / 0.2)',
            'card-hover': '0 4px 6px -1px rgb(0 0 0 / 0.25), 0 2px 4px -2px rgb(0 0 0 / 0.2)',
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .touch-target {
        min-height: 44px;
        min-width: 44px;
      }
    }
  </style>
  <style>
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .toast { animation: toast-in 0.25s ease; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .path-link { word-break: break-all; }
  </style>
</head>
<body class="min-h-screen bg-background text-foreground font-sans text-sm antialiased">
  <div class="max-w-4xl mx-auto px-5 py-6 sm:px-6 sm:py-8">
    <!-- Header -->
    <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 pb-5 border-b border-border">
      <h1 class="text-xl font-semibold tracking-tight text-foreground">C 盘清理</h1>
      <div class="flex flex-wrap items-center gap-3">
        <button type="button" id="btn-scan" class="inline-flex items-center justify-center gap-2 rounded-lg bg-accent px-4 py-2.5 text-sm font-medium text-accent-foreground shadow-card transition-all hover:bg-accent/90 active:scale-[0.98] disabled:pointer-events-none disabled:opacity-50 touch-target">
          扫描 C 盘
        </button>
        <button type="button" id="btn-scan-empty" class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary/90 border border-primary/50 px-4 py-2.5 text-sm font-medium text-primary-foreground transition-all hover:bg-primary active:scale-[0.98] disabled:pointer-events-none disabled:opacity-50 touch-target cursor-pointer">
          扫描空文件夹
        </button>
        <button type="button" id="btn-delete" disabled class="inline-flex items-center justify-center gap-2 rounded-lg bg-destructive px-4 py-2.5 text-sm font-medium text-destructive-foreground shadow-card transition-all hover:bg-destructive/90 active:scale-[0.98] disabled:pointer-events-none disabled:opacity-50 touch-target">
          删除选中
        </button>
        <button type="button" id="btn-delete-empty" disabled class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary/90 border border-primary/50 px-4 py-2.5 text-sm font-medium text-primary-foreground transition-all hover:bg-primary active:scale-[0.98] disabled:pointer-events-none disabled:opacity-50 touch-target cursor-pointer">
          删除选中空文件夹
        </button>
        <button type="button" id="btn-delete-admin" disabled style="display: none;" class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary/90 border border-primary/50 px-4 py-2.5 text-sm font-medium text-primary-foreground transition-all hover:bg-primary active:scale-[0.98] disabled:pointer-events-none disabled:opacity-50 touch-target cursor-pointer">
          管理员权限删除
        </button>
      </div>
    </header>

    <!-- Summary cards -->
    <div id="summary" class="hidden flex flex-wrap gap-4 mb-5">
      <div class="rounded-xl border border-border bg-card px-4 py-3 min-w-[140px] shadow-card">
        <p class="text-xs text-muted-foreground">可释放</p>
        <p id="summary-size" class="text-base font-semibold font-mono text-foreground">—</p>
      </div>
      <div class="rounded-xl border border-border bg-card px-4 py-3 min-w-[140px] shadow-card">
        <p class="text-xs text-muted-foreground">文件数</p>
        <p id="summary-count" class="text-base font-semibold font-mono text-foreground">—</p>
      </div>
    </div>

    <!-- Content -->
    <div id="content"></div>

    <!-- 空文件夹区块 -->
    <div id="empty-folders-section" class="hidden mt-6">
      <div class="rounded-xl border border-border bg-card shadow-card overflow-hidden mb-4" data-category="empty_folders">
        <div class="category-header flex items-center gap-3 px-4 py-3 bg-secondary/50 border-b border-border">
          <input type="checkbox" id="empty-folders-header-check" aria-label="全选空文件夹" class="h-4 w-4 rounded border-border bg-card text-primary focus:ring-primary cursor-pointer" />
          <span class="font-semibold text-foreground">空文件夹</span>
          <span class="ml-auto text-xs text-muted-foreground" id="empty-folders-meta">0 项</span>
        </div>
        <div id="empty-folders-list" class="max-h-64 overflow-auto">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = (window.location.protocol === "http:" || window.location.protocol === "https:")
      ? window.location.origin
      : "http://127.0.0.1:8000";
    const contentEl = document.getElementById("content");
    const summaryEl = document.getElementById("summary");
    const btnScan = document.getElementById("btn-scan");
    const btnScanEmpty = document.getElementById("btn-scan-empty");
    const btnDelete = document.getElementById("btn-delete");
    const btnDeleteEmpty = document.getElementById("btn-delete-empty");
    const btnDeleteAdmin = document.getElementById("btn-delete-admin");

    let currentData = null;
    let lastDeleteErrorPaths = [];
    let emptyFolderPaths = [];

    fetch(API + "/api/health", { method: "GET" })
      .then(r => r.ok ? r.json() : Promise.reject(new Error("后端返回异常")))
      .then(() => renderEmpty())
      .catch(() => {
        const msg = window.location.origin && window.location.origin !== "null"
          ? (window.location.origin !== "http://127.0.0.1:8000" && window.location.origin !== "http://localhost:8000"
            ? "当前通过 " + window.location.origin + " 打开，请求会发往该地址。请改为在地址栏输入 <strong>http://127.0.0.1:8000/</strong> 打开本页面。"
            : "无法连接后端，请确认已在项目目录运行：<code class=\"rounded bg-card px-1.5 py-0.5 text-accent font-mono text-xs\">uvicorn backend.main:app --reload --port 8000</code>")
          : "您可能是双击打开的 HTML 文件（file://）。请先在终端运行 <code class=\"rounded bg-card px-1.5 py-0.5 text-accent font-mono text-xs\">uvicorn backend.main:app --reload --port 8000</code>，再在浏览器地址栏输入 <strong>http://127.0.0.1:8000/</strong> 打开本页面。";
        contentEl.innerHTML = '<div class="rounded-xl border border-border bg-card p-6 text-center text-destructive"><div class="prose prose-invert max-w-none">' + msg + '<br><br>当前请求地址：<code class="rounded bg-secondary px-1.5 py-0.5 font-mono text-xs">' + API + "</code></div></div>";
      });

    const CATEGORY_NAMES = {
      temp: "临时文件",
      cache: "缓存",
      logs: "日志",
      remnants: "已卸载软件残余",
      large: "大文件",
      wechat_files: "微信传输文件",
      wechat_cache: "微信聊天缓存"
    };

    function toast(msg, type) {
      type = type || "info";
      const el = document.createElement("div");
      el.className = "toast fixed bottom-6 right-6 z-[1000] rounded-lg px-4 py-3 text-sm font-medium shadow-card " +
        (type === "success" ? "bg-emerald-600 text-white" : type === "error" ? "bg-destructive text-destructive-foreground" : "bg-card border border-border text-foreground");
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function formatSize(bytes) {
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(2) + " GB";
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + " MB";
      if (bytes >= 1024) return (bytes / 1024).toFixed(2) + " KB";
      return bytes + " B";
    }
    function esc(s) {
      if (!s) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderEmpty() {
      contentEl.innerHTML = '<div class="rounded-xl border border-border bg-card p-12 text-center text-muted-foreground">点击「扫描 C 盘」开始分析可清理文件</div>';
      summaryEl.classList.add("hidden");
    }

    function setLoading(loading) {
      btnScan.disabled = loading;
      if (loading) {
        contentEl.innerHTML = '<div class="rounded-xl border border-border bg-card p-12 text-center text-muted-foreground">正在扫描 C 盘，请稍候…</div>';
        summaryEl.classList.add("hidden");
      }
    }

    function openInExplorer(path) {
      fetch(API + "/api/open-path", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      })
        .then(r => r.ok ? toast("已在资源管理器中打开", "success") : r.json().then(d => toast(d.detail || "打开失败", "error")))
        .catch(() => toast("打开失败", "error"));
    }

    function bindCategoryCheckbox(cat) {
      const headerCheck = document.querySelector(`[data-category="${cat}"] .category-header input[type="checkbox"]`);
      const fileChecks = document.querySelectorAll(`[data-category="${cat}"] .file-table input[type="checkbox"]`);
      if (!headerCheck) return;
      headerCheck.addEventListener("change", () => {
        fileChecks.forEach(cb => { cb.checked = headerCheck.checked; });
        updateDeleteButton();
      });
      fileChecks.forEach(cb => cb.addEventListener("change", updateDeleteButton));
    }

    function updateDeleteButton() {
      const n = document.querySelectorAll(".file-table input[type='checkbox']:checked").length;
      btnDelete.disabled = n === 0;
      btnDelete.textContent = n > 0 ? `删除选中 (${n})` : "删除选中";
      const nEmpty = document.querySelectorAll("#empty-folders-list input[type='checkbox']:checked").length;
      btnDeleteEmpty.disabled = nEmpty === 0;
      btnDeleteEmpty.textContent = nEmpty > 0 ? `删除选中空文件夹 (${nEmpty})` : "删除选中空文件夹";
      if (lastDeleteErrorPaths.length > 0) {
        btnDeleteAdmin.style.display = "inline-flex";
        btnDeleteAdmin.disabled = false;
        btnDeleteAdmin.textContent = `管理员权限删除 (${lastDeleteErrorPaths.length})`;
      } else {
        btnDeleteAdmin.style.display = "none";
        btnDeleteAdmin.disabled = true;
      }
    }

    function render(data, warningPaths) {
      warningPaths = warningPaths || new Set();
      const { categories, summary: sum } = data;
      if (!categories || Object.keys(categories).length === 0) {
        contentEl.innerHTML = '<div class="rounded-xl border border-border bg-card p-12 text-center text-muted-foreground">未发现可清理文件</div>';
        summaryEl.classList.add("hidden");
        return;
      }

      summaryEl.classList.remove("hidden");
      document.getElementById("summary-size").textContent = formatSize(sum.total_size_bytes);
      document.getElementById("summary-count").textContent = sum.total_count;

      let html = "";
      for (const [cat, items] of Object.entries(categories)) {
        const name = CATEGORY_NAMES[cat] || cat;
        const catSize = items.reduce((a, f) => a + f.size, 0);
        const hint = cat === "remnants"
          ? ' <span class="text-muted-foreground font-normal text-xs">（与注册表已安装列表对比，可能为残留目录，请确认后删除）</span>'
          : cat === "large"
            ? ' <span class="text-muted-foreground font-normal text-xs">（文档/下载/桌面等与软件系统无关，≥50MB，可按需删除）</span>'
            : cat === "wechat_files"
              ? ' <span class="text-muted-foreground font-normal text-xs">（FileStorage，聊天中收发的文件）</span>'
              : cat === "wechat_cache"
                ? ' <span class="text-muted-foreground font-normal text-xs">（图片/视频/表情等缓存，删除不影响聊天记录）</span>'
                : "";
        html += `
          <div class="rounded-xl border border-border bg-card shadow-card overflow-hidden mb-4" data-category="${cat}">
            <div class="category-header flex items-center gap-3 px-4 py-3 bg-secondary/50 border-b border-border cursor-pointer select-none hover:bg-secondary/70 transition-colors">
              <input type="checkbox" aria-label="全选${name}" class="h-4 w-4 rounded border-border bg-card text-primary focus:ring-primary cursor-pointer" />
              <span class="font-semibold text-foreground">${name}</span>${hint}
              <span class="ml-auto text-xs text-muted-foreground">${items.length} 项 · ${formatSize(catSize)}</span>
            </div>
            <div class="overflow-x-auto">
              <table class="file-table w-full border-collapse">
                <thead>
                  <tr class="border-b border-border">
                    <th class="text-left py-2.5 px-4 w-10 font-medium text-muted-foreground text-xs"></th>
                    <th class="text-left py-2.5 px-4 w-24 font-medium text-muted-foreground text-xs">大小</th>
                    <th class="text-left py-2.5 px-4 font-medium text-muted-foreground text-xs">路径</th>
                  </tr>
                </thead>
                <tbody>
                  ${items.map(f => {
                    const warn = warningPaths.has(f.path);
                    return `
                    <tr class="border-b border-border/80 hover:bg-secondary/30 transition-colors">
                      <td class="py-2 px-4 align-middle"><input type="checkbox" data-path="${esc(f.path)}" class="h-4 w-4 rounded border-border bg-card text-primary focus:ring-primary cursor-pointer" /></td>
                      <td class="py-2 px-4 font-mono text-xs text-muted-foreground align-middle">${formatSize(f.size)}</td>
                      <td class="py-2 px-4 align-middle">
                        <div class="flex items-center gap-2 flex-wrap">
                          <a class="path-link text-accent hover:underline font-mono text-xs cursor-pointer" href="#" data-path="${esc(f.path)}">${esc(f.path)}</a>
                          ${warn ? '<span class="text-xs text-destructive bg-destructive/15 px-2 py-0.5 rounded">可能被占用，可用管理员权限删除</span>' : ''}
                        </div>
                      </td>
                    </tr>
                  `; }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }
      contentEl.innerHTML = html;

      Object.keys(categories).forEach(cat => bindCategoryCheckbox(cat));
      contentEl.querySelectorAll(".path-link").forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          openInExplorer(a.getAttribute("data-path"));
        });
      });
      updateDeleteButton();

      const wechatCount = (categories.wechat_files || []).length + (categories.wechat_cache || []).length;
      if (wechatCount === 0) {
        fetch(API + "/api/wechat-diagnostic")
          .then(r => r.json())
          .then(d => {
            if (d.error) return;
            const block = document.createElement("div");
            block.className = "rounded-xl border border-border bg-card shadow-card overflow-hidden mb-4 wechat-diagnostic";
            const reg = d.registry_path ? `注册表 FileSavePath：<code class="rounded bg-secondary px-1.5 py-0.5 text-accent font-mono text-xs">${esc(d.registry_path)}</code>` : "注册表 FileSavePath：未设置或无法读取";
            const found = (d.base_paths_found || []).length;
            const list = (d.checked_paths || []).slice(0, 30).map(p => `${p.exists ? "✓" : "✗"} ${esc(p.path)}`).join("<br>");
            block.innerHTML = `
              <div class="flex items-center gap-3 px-4 py-3 bg-secondary/50 border-b border-border">
                <span class="font-semibold text-foreground">微信存储路径诊断</span>
                <span class="ml-auto text-xs text-muted-foreground">未检测到微信传输文件/缓存时可参考</span>
              </div>
              <div class="p-4 text-sm text-muted-foreground space-y-2">
                <p><strong class="text-foreground">${reg}</strong></p>
                <p>已检查的路径中，存在且为目录的共 <strong class="text-foreground">${found}</strong> 个。</p>
                <p>请打开微信 → 设置 → 文件管理，查看「文件存储」显示的路径是否在下列列表中。</p>
                <details>
                  <summary class="cursor-pointer text-accent">已检查的路径列表（前30项）</summary>
                  <div class="mt-2 max-h-48 overflow-auto font-mono text-xs leading-relaxed">${list}</div>
                </details>
                <p class="text-accent mt-3">若您的微信实际路径不在列表中，请将微信里显示的完整路径反馈以便支持。</p>
              </div>
            `;
            contentEl.appendChild(block);
          })
          .catch(() => {});
      }
    }

    function renderEmptyFolders(paths) {
      emptyFolderPaths = paths || [];
      const section = document.getElementById("empty-folders-section");
      const meta = document.getElementById("empty-folders-meta");
      const listEl = document.getElementById("empty-folders-list");
      if (!paths || paths.length === 0) {
        section.classList.add("hidden");
        return;
      }
      section.classList.remove("hidden");
      meta.textContent = paths.length + " 项";
      listEl.innerHTML = paths.map(p => `
        <div class="flex items-center gap-3 px-4 py-2 border-b border-border/80 hover:bg-secondary/30 transition-colors">
          <input type="checkbox" data-path="${esc(p)}" class="empty-folder-check h-4 w-4 rounded border-border bg-card text-primary focus:ring-primary cursor-pointer" />
          <a class="path-link text-accent hover:underline font-mono text-xs cursor-pointer flex-1 min-w-0" href="#" data-path="${esc(p)}">${esc(p)}</a>
        </div>
      `).join("");
      listEl.querySelectorAll(".path-link").forEach(a => {
        a.addEventListener("click", e => { e.preventDefault(); openInExplorer(a.getAttribute("data-path")); });
      });
      const headerCheck = document.getElementById("empty-folders-header-check");
      if (headerCheck) {
        headerCheck.checked = false;
        headerCheck.onchange = () => {
          listEl.querySelectorAll(".empty-folder-check").forEach(cb => { cb.checked = headerCheck.checked; });
          updateDeleteButton();
        };
      }
      listEl.querySelectorAll(".empty-folder-check").forEach(cb => cb.addEventListener("change", updateDeleteButton));
      updateDeleteButton();
    }

    btnScan.addEventListener("click", () => {
      setLoading(true);
      fetch(API + "/api/scan")
        .then(r => r.json())
        .then(data => {
          setLoading(false);
          currentData = data;
          lastDeleteErrorPaths = [];
          if (data.categories) render(data, new Set(lastDeleteErrorPaths));
          else renderEmpty();
        })
        .catch(err => {
          setLoading(false);
          const tip = window.location.protocol === "file:"
            ? "您通过 file:// 打开本页，请先在项目目录运行 <code class=\"rounded bg-card px-1.5 py-0.5 text-accent font-mono text-xs\">uvicorn backend.main:app --reload --port 8000</code>，再在浏览器地址栏输入 <strong>http://127.0.0.1:8000/</strong> 打开。"
            : (window.location.origin !== "http://127.0.0.1:8000" && window.location.origin !== "http://localhost:8000"
              ? "请通过 <strong>http://127.0.0.1:8000/</strong> 或 <strong>http://localhost:8000/</strong> 打开本页面，不要使用其他端口或直接打开 HTML 文件。"
              : "请确认已在项目目录运行：<code class=\"rounded bg-card px-1.5 py-0.5 text-accent font-mono text-xs\">uvicorn backend.main:app --reload --port 8000</code>");
          contentEl.innerHTML = '<div class="rounded-xl border border-border bg-card p-6 text-destructive"><div class="prose prose-invert max-w-none">扫描失败，请确认：<br>1. 已在项目目录运行：<code class="rounded bg-card px-1.5 py-0.5 text-accent font-mono text-xs">uvicorn backend.main:app --reload --port 8000</code><br>2. 在浏览器地址栏输入 <a href="http://127.0.0.1:8000/" class="text-accent hover:underline">http://127.0.0.1:8000/</a> 打开本页面（不要双击 HTML 或使用其他端口）<br><br>' + tip + '<br><br>当前请求地址：<code class="rounded bg-secondary px-1.5 py-0.5 font-mono text-xs">' + API + '</code><br>错误信息：' + (err.message || "无法连接") + '</div></div>';
        });
    });

    btnDelete.addEventListener("click", () => {
      const paths = Array.from(document.querySelectorAll(".file-table input[type='checkbox']:checked"))
        .map(cb => cb.getAttribute("data-path"));
      if (paths.length === 0) return;
      if (!confirm(`确定要删除选中的 ${paths.length} 个文件吗？此操作不可恢复。`)) return;
      btnDelete.disabled = true;
      fetch(API + "/api/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paths })
      })
        .then(r => r.json().then(data => ({ ok: r.ok, data })))
        .then(({ ok, data: res }) => {
          if (!ok) {
            toast(res.detail || "删除请求失败", "error");
            updateDeleteButton();
            return;
          }
          const n = (res.deleted || []).length;
          const errs = (res.errors || []);
          const skip = (res.skipped || []);
          if (n) toast(`已删除 ${n} 个文件`, "success");
          if (errs.length) {
            lastDeleteErrorPaths = errs.map(e => e.path);
            if (currentData) render(currentData, new Set(lastDeleteErrorPaths));
            const msg = errs[0].reason || "权限不足";
            toast(`${errs.length} 个失败：${msg}${errs.length > 1 ? " …" : ""}`, "error");
          } else {
            lastDeleteErrorPaths = [];
          }
          if (skip.length && !n) {
            const msg = skip[0].reason || "被跳过";
            toast(`${skip.length} 个未删除：${msg}${skip.length > 1 ? " …" : ""}`, "info");
          }
          updateDeleteButton();
          if (lastDeleteErrorPaths.length === 0) btnScan.click();
        })
        .catch(() => {
          toast("删除请求失败（请检查网络或后端）", "error");
          updateDeleteButton();
        });
    });

    btnDeleteAdmin.addEventListener("click", () => {
      if (lastDeleteErrorPaths.length === 0) return;
      if (!confirm(`将以管理员权限删除 ${lastDeleteErrorPaths.length} 个文件，会弹出 UAC 确认。继续？`)) return;
      btnDeleteAdmin.disabled = true;
      fetch(API + "/api/delete-admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paths: lastDeleteErrorPaths })
      })
        .then(r => r.json().then(data => ({ ok: r.ok, data })))
        .then(({ ok, data: res }) => {
          if (!ok) {
            toast(res.detail || "管理员删除请求失败", "error");
            updateDeleteButton();
            return;
          }
          const n = (res.deleted || []).length;
          const errs = (res.errors || []);
          if (n) toast(`已删除 ${n} 个文件`, "success");
          lastDeleteErrorPaths = errs.map(e => e.path);
          if (currentData) render(currentData, new Set(lastDeleteErrorPaths));
          updateDeleteButton();
          if (lastDeleteErrorPaths.length === 0) btnScan.click();
        })
        .catch(() => {
          toast("管理员删除请求失败", "error");
          updateDeleteButton();
        });
    });

    btnScanEmpty.addEventListener("click", () => {
      btnScanEmpty.disabled = true;
      document.getElementById("empty-folders-section").classList.add("hidden");
      fetch(API + "/api/scan-empty-folders")
        .then(r => r.json())
        .then(data => {
          btnScanEmpty.disabled = false;
          const paths = data.paths || [];
          if (paths.length === 0) {
            toast("未在安全目录下发现空文件夹", "info");
            return;
          }
          renderEmptyFolders(paths);
          toast("发现 " + paths.length + " 个空文件夹", "success");
        })
        .catch(err => {
          btnScanEmpty.disabled = false;
          toast("扫描失败: " + (err.message || "无法连接"), "error");
        });
    });

    btnDeleteEmpty.addEventListener("click", () => {
      const paths = Array.from(document.querySelectorAll("#empty-folders-list input.empty-folder-check:checked"))
        .map(cb => cb.getAttribute("data-path"));
      if (paths.length === 0) return;
      if (!confirm("确定要删除选中的 " + paths.length + " 个空文件夹吗？")) return;
      btnDeleteEmpty.disabled = true;
      fetch(API + "/api/delete-empty-folders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paths })
      })
        .then(r => r.json())
        .then(res => {
          const n = (res.deleted || []).length;
          const errs = (res.errors || []);
          if (n) toast("已删除 " + n + " 个空文件夹", "success");
          if (errs.length) toast(errs.length + " 个删除失败", "error");
          const stillPresent = emptyFolderPaths.filter(p => !(res.deleted || []).includes(p));
          renderEmptyFolders(stillPresent);
          updateDeleteButton();
        })
        .catch(() => {
          toast("删除请求失败", "error");
          updateDeleteButton();
          btnDeleteEmpty.disabled = false;
        });
    });

    renderEmpty();
  </script>
</body>
</html>
